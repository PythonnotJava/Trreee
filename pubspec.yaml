name: trreee
description: "Trreee — File Tree Reader & Editor with syntax-highlighted preview and dockable panels."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── 本地依赖（packages/）────────────────────────────────────────
  dock_panel:
    path: packages/dock_panel
  flutter_highlight:
    path: packages/flutter_highlight
  highlight:
    path: packages/highlight
  gpt_markdown:
    path: packages/gpt_markdown

  # ── 运行时第三方依赖 ──────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  flutter_math_fork: ^0.7.4
  path: ^1.9.0
  path_provider: ^2.1.4
  file_selector: ^1.0.3
  uuid: ^4.5.1
  window_manager: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/logo.png
    - assets/logo/logo_alpha0.png
